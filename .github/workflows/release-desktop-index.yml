name: Validate desktop release metadata

on:
  pull_request:
    paths:
      - "desktop-releases.json"
      - "scripts/**"
      - ".github/workflows/release-desktop-index.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run validate
